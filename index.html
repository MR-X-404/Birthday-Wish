<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday 🎂</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 id="title">🎉 Happy Birthday, My Special One 🎉</h1>
    <p class="message" id="message">আজকের জন্য অপেক্ষা করো...</p>
    <button id="surpriseBtn" disabled>Click for Surprise 💌</button>
    <div id="surprise" class="hidden"></div>
    <p id="timer"></p>
  </div>

  <canvas id="confetti"></canvas>
  <canvas id="stars"></canvas>

  <!-- Multiple audio -->
  <audio id="voice1" src="voice1.m4a"></audio>
  <audio id="voice2" src="voice2.m4a"></audio>
  <audio id="voice3" src="voice3.m4a"></audio>

  <script src="script.js"></script>
</body>
</html>
