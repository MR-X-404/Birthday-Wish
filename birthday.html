<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday 🎂</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎉 Happy Birthday, My Special One 🎉</h1>
    <p class="message">
      তোমাকে নিয়ে লিখে ফেলতে পারি পুরো একটা জীবন...
      কিন্তু আজ শুধু এইটুকুই বলবো — তুমি আমার জীবনের সবচেয়ে সুন্দর অংশ 💫
    </p>
    <button onclick="showSurprise()">Click for Surprise 💌</button>
    <div id="surprise" class="hidden">
      <p>🌸 তোমার হাসিটাই আমার প্রিয় গান... 🌸</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
